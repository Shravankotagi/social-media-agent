version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: social_agent_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE:-social_agent}
      MYSQL_USER: ${MYSQL_USER:-agent_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agent_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: social_agent_chroma
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8010:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: social_agent_api
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./app:/app/app
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: social_agent_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
  chroma_data: